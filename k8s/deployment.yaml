apiVersion: apps/v1
kind: Deployment
metadata:
  name: notes-api
  namespace: app
  labels:
    app: notes-api
    env: dev
    team: backend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: notes-api
  template:
    metadata:
      labels:
        app: notes-api
        env: dev
        team: backend
    spec:
      containers:
        - name: notes-api
          image: rohan700/notes-api:1.0.0  # using specific tag
          ports:
            - containerPort: 3000
          envFrom:
            - configMapRef:
                name: notes-config
          volumeMounts:
            - name: data
              mountPath: /data
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "200m"
              memory: "256Mi"
          readinessProbe:
            httpGet:
              path: /health
              port: 3000
            initialDelaySeconds: 5
            periodSeconds: 10
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: notes-pvc